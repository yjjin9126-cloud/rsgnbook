<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교재 재고 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f1eb;
    --surface: #ffffff;
    --border: #e0dbd0;
    --text: #1a1a1a;
    --muted: #888880;
    --accent: #0077b6;
    --accent-light: #e0f4ff;
    --green: #0096c7;
    --red: #c0392b;
    --yellow: #b8860b;
    --tag-bg: #e0f4ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--accent);
    color: white;
    padding: 28px 32px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    opacity: 0.6;
  }

  /* Search bar */
  .search-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .search-box {
    flex: 1;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 11px 16px 11px 42px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: 'Noto Sans KR', sans-serif;
    background: rgba(255,255,255,0.15);
    color: white;
    outline: none;
    transition: background 0.2s;
  }

  .search-box input::placeholder { color: rgba(255,255,255,0.5); }
  .search-box input:focus { background: rgba(255,255,255,0.22); }

  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.6;
    font-size: 16px;
  }

  /* Filter chips */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .chip {
    padding: 5px 13px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: transparent;
    color: rgba(255,255,255,0.8);
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .chip:hover { background: rgba(255,255,255,0.15); }
  .chip.active { background: white; color: var(--accent); border-color: white; font-weight: 700; }

  /* Stats bar */
  .stats-bar {
    padding: 14px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 13px;
    color: var(--muted);
  }

  .stats-bar strong { color: var(--text); font-weight: 700; }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }

  /* Table */
  .table-wrap {
    padding: 20px 32px 40px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  thead tr {
    background: var(--accent);
    color: white;
  }

  th {
    padding: 13px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  th:hover { background: rgba(255,255,255,0.1); }

  th .sort-icon {
    margin-left: 4px;
    opacity: 0.5;
    font-size: 10px;
  }

  th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f9f7f2; }

  td {
    padding: 13px 16px;
    font-size: 13.5px;
    vertical-align: middle;
  }

  .td-name {
    max-width: 340px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    font-weight: 500;
  }

  .td-instructor {
    white-space: nowrap;
    font-size: 13px;
  }

  .td-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    text-align: right;
    white-space: nowrap;
  }

  .num-positive { color: var(--green); font-weight: 600; }
  .num-low { color: var(--yellow); font-weight: 600; }
  .num-zero { color: var(--muted); }
  .num-negative { color: var(--red); font-weight: 600; }

  .low-badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    background: #fff3cd;
    color: var(--yellow);
    vertical-align: middle;
  }

  /* 판매여부 badge */
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-on { background: #e0f4ff; color: #0077b6; }
  .badge-off { background: #fef0ee; color: var(--red); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; }

  /* Highlight */
  mark {
    background: #fff3b0;
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .header { padding: 18px 16px 14px; }
    .stats-bar { padding: 12px 16px; gap: 12px; font-size: 12px; }
    .table-wrap { padding: 12px 8px 30px; }
    th, td { padding: 10px 10px; }
    .td-name { max-width: 180px; }
    .filters { gap: 6px; }
  }

  .upload-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border-radius: 6px;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.35);
    color: white;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .upload-btn:hover { background: rgba(255,255,255,0.25); }
  .upload-btn input[type=file] { display: none; }

  .toast {
    display: none;
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: #0077b6;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    z-index: 999;
  }

  .real-stock-input {
    width: 60px;
    padding: 4px 8px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    text-align: right;
    background: #fafafa;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .real-stock-input:focus {
    border-color: #0077b6;
    background: white;
  }
  .real-stock-input.filled {
    background: #e0f4ff;
    border-color: #0077b6;
    color: #0077b6;
    font-weight: 700;
  }


  /* Password lock screen */
  #lockScreen {
    position: fixed;
    inset: 0;
    background: #f4f1eb;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    flex-direction: column;
    gap: 0;
  }
  .lock-card {
    background: white;
    border-radius: 16px;
    padding: 40px 36px 36px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 320px;
  }
  .lock-icon {
    font-size: 2.2rem;
    margin-bottom: 12px;
  }
  .lock-title {
    font-size: 1rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .lock-sub {
    font-size: 12px;
    color: #888;
    margin-bottom: 24px;
  }
  .lock-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e0dbd0;
    border-radius: 8px;
    font-size: 1.2rem;
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    letter-spacing: 6px;
    outline: none;
    transition: border-color 0.15s;
    color: #1a1a1a;
    background: #fafafa;
  }
  .lock-input:focus { border-color: #0077b6; background: white; }
  .lock-input.error { border-color: #c0392b; animation: shake 0.3s; }
  .lock-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: #0077b6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .lock-btn:hover { background: #005f91; }
  .lock-error {
    font-size: 12px;
    color: #c0392b;
    margin-top: 10px;
    min-height: 18px;
    font-weight: 500;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">교재 재고 검색</div>
    <div class="lock-sub">러셀 강남 서점 · 팀 전용</div>
    <input class="lock-input" type="password" id="pwInput" placeholder="••••" maxlength="10" autocomplete="off">
    <button class="lock-btn" onclick="checkPw()">입장하기</button>
    <div class="lock-error" id="pwError"></div>
  </div>
</div>

<script>
  const PW = '1010';
  function checkPw() {
    const val = document.getElementById('pwInput').value;
    if (val === PW) {
      document.getElementById('lockScreen').style.display = 'none';
    } else {
      const inp = document.getElementById('pwInput');
      inp.classList.add('error');
      document.getElementById('pwError').textContent = '비밀번호가 틀렸습니다.';
      setTimeout(() => { inp.classList.remove('error'); inp.value = ''; }, 500);
    }
  }
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pwInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPw();
    });
  });
</script>

<div class="header">
  <div class="header-top">
    <h1>📚 교재 재고 검색</h1>
    <button class="upload-btn" onclick="loadFromSheet()" style="margin-right:8px">🔄 새로고침</button><span id="updateTime" style="font-size:11px;color:rgba(255,255,255,0.85);font-family:'IBM Plex Mono',monospace;background:rgba(255,255,255,0.12);padding:5px 12px;border-radius:6px;white-space:nowrap;">-</span><span class="header-meta" id="fileLabel">러셀 강남 서점 · <span style="opacity:0.9;font-weight:600;">by 유진</span></span>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="교재명 또는 강사명으로 검색..." autocomplete="off" inputmode="search" enterkeyhint="search">
    </div>
  </div>
  <div class="filters">
    <button class="chip active" data-filter="all">전체</button>
    <button class="chip" data-filter="판매중">판매중</button>
    <button class="chip" data-filter="판매중지">판매중지</button>
    <button class="chip" data-filter="재고있음">재고 있음</button>
    <button class="chip" data-filter="재고부족">⚠️ 재고부족</button>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <span>검색결과: <strong id="resultCount">0</strong>건</span>
  <span class="stat-item"><span class="dot dot-green"></span><span id="countOn">0</span> 판매중</span>
  <span class="stat-item"><span class="dot dot-red"></span><span id="countOff">0</span> 판매중지</span>
  <span class="stat-item"><span class="dot dot-yellow"></span><span id="countStock">0</span> 재고있음</span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('교재명')">교재명 <span class="sort-icon" id="sort-교재명">↕</span></th>
        <th onclick="sortBy('강사명')">강사명 <span class="sort-icon" id="sort-강사명">↕</span></th>
        <th onclick="sortBy('입고수량')" style="text-align:right">입고수량 <span class="sort-icon" id="sort-입고수량">↕</span></th>
        <th onclick="sortBy('재고수량')" style="text-align:right">재고수량 <span class="sort-icon" id="sort-재고수량">↕</span></th>
        <th onclick="sortBy('판매여부')">판매여부 <span class="sort-icon" id="sort-판매여부">↕</span></th>
        <th style="text-align:right">실재고 <span style="font-size:10px;opacity:0.6">(직접입력)</span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">🔎</div>
    <p>검색 결과가 없습니다.</p>
  </div>
</div>

<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyA0wNMhUNcZqFAwRji11rTdzcqS38F3xFLRmz5UWxSA4wO-OWxRbMSo0nVmM1fs981/exec';

let RAW = [];
let filtered = [];
let sortKey = null;
let sortAsc = true;
let activeFilter = 'all';
let searchQuery = '';
const realStock = {};

function showLoading() {
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:48px;color:#888;font-size:14px">⏳ 구글 시트에서 데이터를 불러오는 중...</td></tr>';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultCount').textContent = '-';
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  function splitLine(line) {
    const res = []; let cur = ''; let inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { res.push(cur.trim().replace(/^"|"$/g,'')); cur = ''; }
      else { cur += ch; }
    }
    res.push(cur.trim().replace(/^"|"$/g,''));
    return res;
  }
  const headers = splitLine(lines[0]);
  const ni = headers.findIndex(h => h.includes('교재명'));
  const ii = headers.findIndex(h => h.includes('강사명'));
  const ini = headers.findIndex(h => h.includes('입고수량'));
  const si = headers.findIndex(h => h.includes('재고수량'));
  const pi = headers.findIndex(h => h.includes('판매여부'));
  const ri = headers.findIndex(h => h.includes('실재고'));
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const c = splitLine(lines[i]);
    if (!c[ni] || c[ni] === '교재명' || c[ni] === '') continue;
    const inQty = parseInt(c[ini]);
    const stQty = parseInt(c[si]);
    if (isNaN(inQty) && isNaN(stQty)) continue;
    result.push({ 교재명: c[ni]||'', 강사명: c[ii]||'', 입고수량: isNaN(inQty)?0:inQty, 재고수량: isNaN(stQty)?0:stQty, 판매여부: c[pi]||'', 실재고: ri>=0?(c[ri]||''):'' });
  }
  return result;
}

async function loadFromSheet() {
  showLoading();
  try {
    const res = await fetch(SCRIPT_URL, {signal: AbortSignal.timeout(10000)});
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error('데이터 없음');
    RAW.length = 0;
    data.forEach(d => RAW.push(d));
    filtered = [...RAW];
    applyFilter();
    document.getElementById('fileLabel').textContent = '러셀 강남 서점 · by 유진';
    document.getElementById('updateTime').textContent = '📅 ' + new Date().toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' 업데이트';
    showToast('✅ ' + data.length + '건 불러오기 완료!');
  } catch(e) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:48px;color:#c0392b;font-size:13px">⚠️ 데이터를 불러오지 못했습니다.<br>잠시 후 🔄 새로고침을 눌러주세요.</td></tr>';
  }
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function applyFilter() {
  const q = searchQuery.toLowerCase();
  filtered = RAW.filter(r => {
    const matchQ = !q || r.교재명.toLowerCase().includes(q) || r.강사명.toLowerCase().includes(q);
    let matchF = true;
    if (activeFilter === '판매중') matchF = r.판매여부 === '판매중';
    else if (activeFilter === '판매중지') matchF = r.판매여부 === '판매중지';
    else if (activeFilter === '재고있음') matchF = r.재고수량 > 0;
    else if (activeFilter === '재고없음') matchF = r.재고수량 <= 0;
    else if (activeFilter === '재고부족') matchF = r.재고수량 > 0 && r.재고수량 < 5;
    return matchQ && matchF;
  });
  if (sortKey) {
    filtered.sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'string') av = av.localeCompare(bv, 'ko');
      else av = av - bv;
      return sortAsc ? av : -av;
    });
  }
  render();
}

function render() {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  const q = searchQuery;
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = RAW.length > 0 ? 'block' : 'none';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = filtered.map(r => {
      const idx = RAW.indexOf(r);
      const saved = realStock[idx] !== undefined ? realStock[idx] : (r.실재고 || '');
      const filledClass = saved !== '' ? 'filled' : '';
      const stockClass = r.재고수량 <= 0 ? (r.재고수량 < 0 ? 'num-negative' : 'num-zero') : r.재고수량 < 5 ? 'num-low' : 'num-positive';
      const lowBadge = r.재고수량 > 0 && r.재고수량 < 5 ? '<span class="low-badge">재고부족</span>' : '';
      const badgeClass = r.판매여부 === '판매중' ? 'badge-on' : 'badge-off';
      return '<tr>' +
        '<td class="td-name">' + highlight(r.교재명, q) + '</td>' +
        '<td class="td-instructor">' + highlight(r.강사명, q) + '</td>' +
        '<td class="td-num num-zero">' + r.입고수량.toLocaleString() + '</td>' +
        '<td class="td-num ' + stockClass + '">' + r.재고수량.toLocaleString() + lowBadge + '</td>' +
        '<td><span class="badge ' + badgeClass + '">' + r.판매여부 + '</span></td>' +
        '<td style="text-align:right"><input class="real-stock-input ' + filledClass + '" type="number" data-idx="' + idx + '" data-name="' + escHtml(r.교재명) + '" value="' + saved + '" placeholder="-"></td>' +
        '</tr>';
    }).join('');
  }
  const on = filtered.filter(r => r.판매여부 === '판매중').length;
  const off = filtered.filter(r => r.판매여부 === '판매중지').length;
  const stock = filtered.filter(r => r.재고수량 > 0).length;
  document.getElementById('resultCount').textContent = filtered.length.toLocaleString();
  document.getElementById('countOn').textContent = on;
  document.getElementById('countOff').textContent = off;
  document.getElementById('countStock').textContent = stock;

  document.querySelectorAll('.real-stock-input').forEach(input => {
    let saveTimer = null;
    input.addEventListener('input', function() {
      const idx = parseInt(this.dataset.idx);
      const name = this.dataset.name;
      const val = this.value.trim();
      if (val === '') { delete realStock[idx]; this.classList.remove('filled'); }
      else { realStock[idx] = val; this.classList.add('filled'); }
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ name: name, value: val }),
          headers: { 'Content-Type': 'text/plain' }
        }).then(() => showToast('✅ 저장됐어요!')).catch(() => showToast('⚠️ 저장 실패'));
      }, 800);
    });
    input.addEventListener('focus', function() { this.select(); });
  });
}

function sortBy(key) {
  if (sortKey === key) { sortAsc = !sortAsc; }
  else { sortKey = key; sortAsc = true; }
  document.querySelectorAll('.sort-icon').forEach(el => { el.textContent = '↕'; el.closest('th').classList.remove('sorted'); });
  const icon = document.getElementById('sort-' + key);
  if (icon) { icon.textContent = sortAsc ? '↑' : '↓'; icon.closest('th').classList.add('sorted'); }
  applyFilter();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.style.display = 'block';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  applyFilter();
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    applyFilter();
  });
});


// 앱 시작 시 구글 시트에서 자동 로드
loadFromSheet();
</script>
</body>
</html>
